name: Hugo CI
on: [push, pull_request]
jobs:
  build:
    name: Build Hugo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.134.0'
          extended: true
      - name: Generate redirects
        run: |
          python3 scripts/generate_redirects.py
      - name: Build site
        run: |
          hugo --minify --buildFuture
